version: 2

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - env:
      - CGO_ENABLED=0
    binary: spec
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/aaronl1011/spec/cmd.Version={{.Version}}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*
      - docs/man/*

brews:
  - name: spec
    repository:
      owner: aaronl1011
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/aaronl1011/spec"
    description: "Developer control plane CLI"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "spec"
      man1.install Dir["docs/man/*.1"] if Dir.exist?("docs/man")
    test: |
      system "#{bin}/spec", "version"

# Generate checksums file for verification
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Changelog from conventional commits (supplementary to release-please)
changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "^style:"

# Release configuration
release:
  github:
    owner: aaronl1011
    name: spec
  draft: false
  prerelease: auto
  mode: replace
  footer: |
    ## Installation

    **Homebrew:**
    ```bash
    brew install aaronl1011/tap/spec
    ```

    **Go install:**
    ```bash
    go install github.com/aaronl1011/spec-cli@{{ .Tag }}
    ```

    **Binary download:**
    Download the appropriate archive for your platform, extract, and add to your PATH.

    **Verify checksums:**
    ```bash
    sha256sum -c checksums.txt
    ```

# Announce new releases (optional - uncomment if desired)
